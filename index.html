<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nojiri - Liens officiels</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* PARTICLES */
canvas#particles{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:0;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity .5s ease;
}
#loader.hidden{opacity:0;pointer-events:none;}

.ring{
  position:absolute;
  border:2px solid transparent;
  border-top:2px solid #fff;
  border-radius:50%;
  animation:spin linear infinite;
}
.ring:nth-child(1){width:60px;height:60px;animation-duration:1.4s;}
.ring:nth-child(2){width:90px;height:90px;animation-duration:2s;}
.ring:nth-child(3){width:120px;height:120px;animation-duration:2.6s;}
.ring:nth-child(4){width:150px;height:150px;animation-duration:3.2s;}

@keyframes spin{to{transform:rotate(360deg);}}

/* CONTENT */
.container{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  z-index:1;
}

.card{
  width:100%;
  max-width:460px;
  padding:40px;
  border-radius:24px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  text-align:center;
  backdrop-filter:blur(12px);
}

/* AVATAR WRAPPER */
.avatar-wrapper{
  position:relative;
  width:110px;
  margin:0 auto 20px;
}

/* AVATAR */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  overflow:hidden;
  border:2px solid #fff;
  position:relative;
  animation:glow 4s infinite;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .4s ease;
}

.avatar:hover img{
  transform:scale(1.1);
}

/* GLOW */
@keyframes glow{
  0%{box-shadow:0 0 10px rgba(88,101,242,.5);}
  50%{box-shadow:0 0 25px rgba(88,101,242,1);}
  100%{box-shadow:0 0 10px rgba(88,101,242,.5);}
}

/* STATUS */
.status{
  position:absolute;
  bottom:6px;
  right:6px;
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid #0a0a0a;
}
.online{background:#23a559;}

/* BADGES */
.badges{
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
}

.badge{
  background:#111;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:8px;
  padding:2px 6px;
  font-size:12px;
}

/* TEXT */
h1{margin:0;font-size:34px;font-weight:800;}
.subtitle{margin-bottom:28px;color:#9ca3af;font-size:14px;}

/* LINKS */
.links{display:grid;gap:16px;}

.link{
  padding:16px 22px;
  border-radius:18px;
  text-decoration:none;
  color:#fff;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:.3s;
}

.link:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(255,255,255,.2);
}

.icon{width:18px;margin-right:10px;}

.twitter{background:linear-gradient(135deg,#1DA1F2,#0d74d1);}
.instagram{background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF);}
.twitch{background:linear-gradient(135deg,#9146FF,#5B1FBF);}
.youtube{background:linear-gradient(135deg,#FF0000,#CC0000);}
.discord{background:linear-gradient(135deg,#5865F2,#404EED);}
.email{background:linear-gradient(135deg,#6D4AFF,#1B1340);}

/* FOOTER */
#powered{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,0.15);
  padding:8px 14px;
  border-radius:10px;
  font-size:12px;
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="loader">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="container">
  <div class="card">

    <!-- AVATAR DISCORD PREMIUM -->
    <div class="avatar-wrapper">
      <div class="avatar">
        <img id="avatar">
        <span class="status online"></span>
      </div>

      <div class="badges">
        <span class="badge">⚡</span>
        <span class="badge">💎</span>
      </div>
    </div>

    <h1>Nojiri</h1>
    <div class="subtitle">Liens officiels</div>

    <div class="links">
      <a class="link twitter" href="https://x.com/Nojiri__" target="_blank">
        <span><img class="icon" src="https://cdn.simpleicons.org/x/ffffff">X</span>
      </a>

      <a class="link instagram" href="https://www.instagram.com/tin.ous/" target="_blank">
        <span><img class="icon" src="https://cdn.simpleicons.org/instagram/ffffff">Instagram</span>
      </a>

      <a class="link twitch" href="https://www.twitch.tv/tinouski63" target="_blank">
        <span><img class="icon" src="https://cdn.simpleicons.org/twitch/ffffff">Twitch</span>
      </a>

      <a class="link youtube" href="https://www.youtube.com/channel/UCvzZQ37KZ9Rz9VkEPU2CM_w" target="_blank">
        <span><img class="icon" src="https://cdn.simpleicons.org/youtube/ffffff">YouTube</span>
      </a>

      <a class="link discord" href="https://discord.gg/vxwEjwWkKr" target="_blank">
        <span><img class="icon" src="https://cdn.simpleicons.org/discord/ffffff">Discord</span>
      </a>

      <a class="link email" href="mailto:Nojiri_pro@protonmail.com">
        <span><img class="icon" src="https://cdn.simpleicons.org/protonmail/ffffff">Email</span>
      </a>
    </div>

  </div>
</div>

<a id="powered" href="https://kua.vercel.app" target="_blank">Powered by Kua</a>

<script>
// loader
window.addEventListener("load", () => {
  document.getElementById("loader").classList.add("hidden");
});

// avatar dynamique
const userId = "1156589290252419212";
const avatar = document.getElementById("avatar");

// fallback
avatar.src = `https://cdn.discordapp.com/avatars/${userId}.png?size=1024`;

fetch(`https://discord.com/api/users/${userId}`)
.then(res => res.json())
.then(data => {
  if(!data.avatar) return;
  const format = data.avatar.startsWith("a_") ? "gif" : "png";
  avatar.src = `https://cdn.discordapp.com/avatars/${data.id}/${data.avatar}.${format}?size=1024`;
});

// particles
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
