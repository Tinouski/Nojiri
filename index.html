<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nojiri — Liens officiels</title>
  <meta name="description" content="Page de liens officiels de Nojiri" />

  <!-- Google Fonts : Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* =====================================================
       VARIABLES & RESET
    ===================================================== */
    :root {
      --bg:        #080810;
      --surface:   rgba(255,255,255,0.035);
      --border:    rgba(255,255,255,0.07);
      --text:      #e8e8f0;
      --muted:     rgba(232,232,240,0.45);
      --accent:    #7c6aff;
      --accent2:   #ff6aab;
      --glow-a:    rgba(124,106,255,0.55);
      --glow-b:    rgba(255,106,171,0.45);
      --card-blur: blur(22px) saturate(160%);
      --radius:    20px;
      --ease:      cubic-bezier(0.23,1,0.32,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* =====================================================
       CANVAS PARTICULES
    ===================================================== */
    #canvas-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* =====================================================
       LOADER
    ===================================================== */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s var(--ease), visibility 0.6s;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }

    .loader-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--accent2);
      animation: spin 0.9s linear infinite;
      box-shadow: 0 0 20px var(--glow-a), 0 0 40px var(--glow-b);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =====================================================
       AMBIENT GRADIENTS (deco)
    ===================================================== */
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .ambient-a {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--accent), transparent 70%);
      top: -120px; left: -160px;
      animation-duration: 14s;
    }
    .ambient-b {
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--accent2), transparent 70%);
      bottom: -100px; right: -120px;
      animation-duration: 10s;
      animation-direction: alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.06); }
    }

    /* =====================================================
       LAYOUT PRINCIPAL
    ===================================================== */
    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 32px 16px 48px;
    }

    /* =====================================================
       CARTE PRINCIPALE (glassmorphism + tilt 3D)
    ===================================================== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: var(--card-blur);
      -webkit-backdrop-filter: var(--card-blur);
      border-radius: 28px;
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      box-shadow:
        0 4px 40px rgba(0,0,0,0.55),
        0 0 0 1px var(--border),
        inset 0 1px 0 rgba(255,255,255,0.06);
      will-change: transform;
      transition: box-shadow 0.4s var(--ease);
      transform-style: preserve-3d;

      /* Animation d'entree */
      opacity: 0;
      transform: translateY(32px) scale(0.97);
      animation: cardIn 0.9s 0.55s var(--ease) forwards;
    }
    @keyframes cardIn {
      to { opacity:1; transform: translateY(0) scale(1); }
    }

    /* =====================================================
       AVATAR
    ===================================================== */
    .avatar-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    /* Anneau de glow anime */
    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        var(--accent),
        var(--accent2),
        #4af7ff,
        var(--accent),
        var(--accent2)
      );
      animation: ringRotate 3s linear infinite;
      z-index: -1;
    }
    @keyframes ringRotate {
      to { transform: rotate(360deg); }
    }
    /* Masque interieur pour l'effet anneau */
    .avatar-ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg);
    }

    .avatar-img {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 24px var(--glow-a), 0 0 8px rgba(0,0,0,0.8);
    }

    /* Indicateur de statut */
    .status-dot {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #23d05e;
      border: 3px solid var(--bg);
      z-index: 2;
      box-shadow: 0 0 10px rgba(35,208,94,0.6);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .status-dot.offline { background: #555; box-shadow: none; animation: none; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px rgba(35,208,94,0.6); }
      50%      { box-shadow: 0 0 18px rgba(35,208,94,0.9); }
    }

    /* =====================================================
       BADGES
    ===================================================== */
    .badges {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
    }
    .badge-nitro {
      background: linear-gradient(135deg, rgba(88,101,242,0.2), rgba(255,106,171,0.2));
      border-color: rgba(88,101,242,0.4);
      color: #a8b5ff;
    }
    .badge-verified {
      background: linear-gradient(135deg, rgba(35,208,94,0.15), rgba(0,200,160,0.15));
      border-color: rgba(35,208,94,0.35);
      color: #6effc0;
    }
    .badge svg { width: 11px; height: 11px; fill: currentColor; }

    /* =====================================================
       NOM & BIO
    ===================================================== */
    .profile-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.55rem, 5vw, 1.9rem);
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #fff 30%, var(--accent) 70%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .profile-bio {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
      max-width: 300px;
      font-weight: 300;
    }

    /* =====================================================
       DIVISEUR
    ===================================================== */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 24px;
    }

    /* =====================================================
       LIENS / BOUTONS
    ===================================================== */
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.28s var(--ease),
        box-shadow 0.28s var(--ease),
        border-color 0.28s var(--ease),
        background 0.28s var(--ease);

      /* Apparition en cascade */
      opacity: 0;
      transform: translateY(18px);
    }
    .link-btn.visible {
      animation: btnIn 0.55s var(--ease) forwards;
    }
    @keyframes btnIn {
      to { opacity:1; transform:translateY(0); }
    }

    /* Gradient de fond (pseudo-element) */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s var(--ease);
      border-radius: inherit;
    }

    .link-btn:hover::before { opacity: 1; }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.018);
      border-color: rgba(255,255,255,0.14);
    }

    /* Effet de clic */
    .link-btn:active {
      transform: translateY(-1px) scale(0.99);
      transition-duration: 0.1s;
    }

    /* Ripple au clic */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transform: scale(0);
      animation: ripple-anim 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Icone */
    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-icon svg { width: 18px; height: 18px; fill: #fff; }

    .btn-label { flex: 1; }
    .btn-label strong { display: block; font-weight: 600; font-size: 0.9rem; }
    .btn-label span { font-size: 0.75rem; color: var(--muted); font-weight: 300; }

    .btn-arrow {
      opacity: 0.35;
      transition: opacity 0.25s, transform 0.25s var(--ease);
      font-size: 1rem;
    }
    .link-btn:hover .btn-arrow { opacity: 0.8; transform: translateX(4px); }

    /* Couleurs par reseau */
    .btn-x::before         { background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(30,30,30,0.5)); }
    .btn-x:hover           { box-shadow: 0 8px 30px rgba(100,100,100,0.25); }
    .btn-x .btn-icon       { background: linear-gradient(135deg, #1a1a1a, #333); }

    .btn-instagram::before { background: linear-gradient(135deg, rgba(225,48,108,0.18), rgba(193,53,132,0.15), rgba(253,126,20,0.12)); }
    .btn-instagram:hover   { box-shadow: 0 8px 30px rgba(225,48,108,0.28); }
    .btn-instagram .btn-icon { background: linear-gradient(135deg, #e1306c, #c13584, #fd7e14); }

    .btn-twitch::before    { background: linear-gradient(135deg, rgba(145,70,255,0.2), rgba(100,65,165,0.15)); }
    .btn-twitch:hover      { box-shadow: 0 8px 30px rgba(145,70,255,0.3); }
    .btn-twitch .btn-icon  { background: linear-gradient(135deg, #9146ff, #6441a5); }

    .btn-youtube::before   { background: linear-gradient(135deg, rgba(255,0,0,0.18), rgba(200,0,0,0.12)); }
    .btn-youtube:hover     { box-shadow: 0 8px 30px rgba(255,0,0,0.28); }
    .btn-youtube .btn-icon { background: linear-gradient(135deg, #ff0000, #cc0000); }

    .btn-discord::before   { background: linear-gradient(135deg, rgba(88,101,242,0.22), rgba(60,70,200,0.15)); }
    .btn-discord:hover     { box-shadow: 0 8px 30px rgba(88,101,242,0.32); }
    .btn-discord .btn-icon { background: linear-gradient(135deg, #5865f2, #3c46c8); }

    .btn-email::before     { background: linear-gradient(135deg, rgba(124,106,255,0.18), rgba(255,106,171,0.13)); }
    .btn-email:hover       { box-shadow: 0 8px 30px rgba(124,106,255,0.25); }
    .btn-email .btn-icon   { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    /* =====================================================
       FOOTER
    ===================================================== */
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.6s 1.4s var(--ease) forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: rgba(255,255,255,0.45); }

    /* =====================================================
       RESPONSIVE
    ===================================================== */
    @media (max-width: 480px) {
      .card { padding: 32px 20px 28px; border-radius: 24px; }
      main  { padding: 24px 12px 40px; }
    }
  </style>
</head>

            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </span>
          <span class="btn-label">
            <strong>Email</strong>
            <span>contact@nojiri.dev</span>
          </span>
          <span class="btn-arrow">&#8594;</span>
        </a>

      </nav>
    </div><!-- /card -->

    <p class="footer">
      &copy; 2025 Nojiri &nbsp;&middot;&nbsp; Fait avec &#10084;&#65039; &amp; &#9749;
    </p>
  </main>

  <script>
    /* =====================================================
       UTILITAIRES
    ===================================================== */
    const $ = id => document.getElementById(id);

    /* =====================================================
       LOADER masque apres chargement
    ===================================================== */
    window.addEventListener('load', () => {
      setTimeout(() => {
        $('loader').classList.add('hidden');
        animateButtons();
      }, 600);
    });

    /* =====================================================
       CANVAS PARTICULES
    ===================================================== */
    (function initParticles() {
      const canvas = $('canvas-bg');
      const ctx    = canvas.getContext('2d');
      let   W, H, particles = [];

      const COLORS = [
        'rgba(124,106,255,',
        'rgba(255,106,171,',
        'rgba(74,247,255,',
        'rgba(255,255,255,'
      ];
      const COUNT = 70;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticle() {
        return {
          x:   Math.random() * W,
          y:   Math.random() * H,
          r:   Math.random() * 1.8 + 0.4,
          vx:  (Math.random() - 0.5) * 0.35,
          vy:  (Math.random() - 0.5) * 0.35,
          col: COLORS[Math.floor(Math.random() * COLORS.length)],
          a:   Math.random() * 0.5 + 0.1
        };
      }

      function initArr() {
        particles = Array.from({ length: COUNT }, createParticle);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        /* Lignes de connexion */
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx   = particles[i].x - particles[j].x;
            const dy   = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 130) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(124,106,255,${0.06 * (1 - dist / 130)})`;
              ctx.lineWidth   = 0.6;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        /* Points */
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.col + p.a + ')';
          ctx.fill();

          p.x += p.vx;
          p.y += p.vy;

          if (p.x < -5)   p.x = W + 5;
          if (p.x > W + 5) p.x = -5;
          if (p.y < -5)   p.y = H + 5;
          if (p.y > H + 5) p.y = -5;
        });

        requestAnimationFrame(draw);
      }

      resize();
      initArr();
      draw();
      window.addEventListener('resize', resize);
    })();

    /* =====================================================
       AVATAR DISCORD via Lanyard
       Remplacer USER_ID par l'ID Discord reel de Nojiri
    ===================================================== */
    (async function loadDiscordAvatar() {
      const USER_ID = '1156589290252419212'; // <- Remplacer par l'ID Discord reel

      try {
        const res  = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
        const json = await res.json();
        if (!json.success) throw new Error('not found');

        const { discord_user, discord_status } = json.data;
        const { id, avatar, username }         = discord_user;

        // GIF si avatar anime (commence par a_), sinon PNG
        const ext = avatar && avatar.startsWith('a_') ? 'gif' : 'png';
        const url = `https://cdn.discordapp.com/avatars/${id}/${avatar}.${ext}?size=256`;

        const img = $('avatar');
        img.src   = url;
        img.alt   = `Avatar de ${username}`;

        // Mise a jour du statut
        const dot = $('status-dot');
        if (discord_status === 'idle') {
          dot.style.background = '#faa81a';
          dot.style.boxShadow  = '0 0 10px rgba(250,168,26,0.6)';
          dot.title = 'Absent';
        } else if (discord_status === 'dnd') {
          dot.style.background = '#f04747';
          dot.style.boxShadow  = '0 0 10px rgba(240,71,71,0.6)';
          dot.style.animation  = 'none';
          dot.title = 'Ne pas deranger';
        } else if (discord_status === 'offline') {
          dot.classList.add('offline');
          dot.title = 'Hors ligne';
        }
      } catch (err) {
        // Fallback silencieux — avatar generique deja defini en HTML
        console.info('[Nojiri] Avatar Discord : fallback.', err.message);
      }
    })();

    /* =====================================================
       ANIMATION DES BOUTONS EN CASCADE
    ===================================================== */
    function animateButtons() {
      document.querySelectorAll('.link-btn').forEach((btn, i) => {
        btn.style.animationDelay = `${0.7 + i * 0.09}s`;
        btn.classList.add('visible');
      });
    }

    /* =====================================================
       EFFET RIPPLE AU CLIC
    ===================================================== */
    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const rect   = this.getBoundingClientRect();
        const x      = e.clientX - rect.left;
        const y      = e.clientY - rect.top;
        const ripple = document.createElement('span');
        const size   = Math.max(rect.width, rect.height) * 1.5;

        ripple.classList.add('ripple');
        ripple.style.cssText = `
          width:${size}px; height:${size}px;
          left:${x - size / 2}px; top:${y - size / 2}px;
        `;
        this.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });

    /* =====================================================
       TILT 3D SUR LA CARTE (desktop uniquement)
    ===================================================== */
    (function initTilt() {
      if (window.matchMedia('(max-width: 640px)').matches) return;

      const card     = $('card');
      const MAX_TILT = 8;

      card.addEventListener('mousemove', e => {
        const rect  = card.getBoundingClientRect();
        const cx    = rect.left + rect.width  / 2;
        const cy    = rect.top  + rect.height / 2;
        const dx    = (e.clientX - cx) / (rect.width  / 2);
        const dy    = (e.clientY - cy) / (rect.height / 2);
        const tiltX = -dy * MAX_TILT;
        const tiltY =  dx * MAX_TILT;

        card.style.transform =
          `perspective(900px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.015)`;
        card.style.boxShadow =
          `${-tiltY * 2}px ${tiltX * 2}px 60px rgba(124,106,255,0.18),
           0 4px 40px rgba(0,0,0,0.55),
           0 0 0 1px rgba(255,255,255,0.07),
           inset 0 1px 0 rgba(255,255,255,0.06)`;
      });

      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
        card.style.boxShadow = '';
      });
    })();

    /* =====================================================
       CURSEUR PERSONNALISE (desktop)
    ===================================================== */
    (function initCursor() {
      if (window.matchMedia('(max-width: 640px)').matches) return;

      const cursor = document.createElement('div');
      cursor.style.cssText = `
        position:fixed; pointer-events:none; z-index:9999;
        width:28px; height:28px; border-radius:50%;
        border:1.5px solid rgba(124,106,255,0.55);
        transform:translate(-50%,-50%);
        transition: width 0.22s, height 0.22s, border-color 0.22s;
        mix-blend-mode: difference;
        left:-100px; top:-100px;
      `;
      document.body.appendChild(cursor);

      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
      });

      document.querySelectorAll('.link-btn, .badge').forEach(el => {
        el.addEventListener('mouseenter', () => {
          cursor.style.width       = '50px';
          cursor.style.height      = '50px';
          cursor.style.borderColor = 'rgba(255,106,171,0.8)';
        });
        el.addEventListener('mouseleave', () => {
          cursor.style.width       = '28px';
          cursor.style.height      = '28px';
          cursor.style.borderColor = 'rgba(124,106,255,0.55)';
        });
      });
    })();
  </script>
